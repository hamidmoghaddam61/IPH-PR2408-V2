<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="utf-8">
  <title>راهنما (Tooltip)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body, input, button, textarea {
      font-family: Tahoma, sans-serif !important;
      font-size: 14px !important;
    }
    .tooltip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
      gap: 12px;
    }
    .tooltip-card {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 8px;
    }
    .tooltip-title {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .tooltip-input {
      width: 100%;
      margin-bottom: 4px;
    }
    .add-btn {
      font-size: 12px;
      padding: 2px 6px;
      margin-bottom: 4px;
    }

    /* Light mode: cards readable */
    html[data-theme="light"] .tooltip-card {
      background: rgba(0,0,0,0.05) !important;
    }
  </style>
</head>
<body class="dash-body">
  <div class="dashboard-shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="app-logo">SW</div>
        <div class="app-name">راهنما (Tooltip)</div>
      </div>

      <div class="topbar-right">
        <div id="clock" class="clock-text"></div>

        <div class="theme-switch" title="Dark/Light">
          <label class="switch">
            <input id="themeToggle" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </header>

    <div class="layout">
      <nav class="side-menu">
        <a href="/dashboard" class="side-item">
          <span class="side-icon">📊</span>
          <span class="side-text">داشبورد</span>
        </a>
        <a href="/settings" class="side-item">
          <span class="side-icon">⚙️</span>
          <span class="side-text">تنظیمات</span>
        </a>
        <a href="/tooltip" class="side-item active">
          <span class="side-icon">💬</span>
          <span class="side-text">راهنما (Tooltip)</span>
        </a>
        <a href="/log" class="side-item">
          <span class="side-icon">📜</span>
          <span class="side-text">لاگ</span>
        </a>
        <a href="/timer" class="side-item">
          <span class="side-icon">⏱</span>
          <span class="side-text">تایمر</span>
        </a>
        <a href="/logout" class="side-item">
          <span class="side-icon">🚪</span>
          <span class="side-text">خروج</span>
        </a>
      </nav>

      <main class="dash-main">
        <section class="card glass light">
          <h3 class="card-title">توضیحات پورت‌ها</h3>
          <p class="settings-text">برای هر پورت می‌توانید تا ۵ خط توضیح وارد کنید. هنگام قرار گرفتن موس روی آیکون آن پورت، این توضیحات به صورت Tooltip نمایش داده می‌شود.</p>
          <div id="portsContainer" class="tooltip-grid"></div>
        </section>

        <section class="card glass light">
          <h3 class="card-title">توضیحات رله‌ها</h3>
          <p class="settings-text">برای هر رله می‌توانید تا ۵ خط توضیح وارد کنید.</p>
          <div id="relaysContainer" class="tooltip-grid"></div>
        </section>

        <section class="card glass">
          <button class="btn primary small" onclick="saveAll()">ذخیره همه</button>
          <span id="statusMsg" class="settings-text" style="margin-right:8px;"></span>
        </section>
      </main>
    </div>
  </div>

  <script>
    // -------- Theme (Dark/Light) --------
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const theme = saved || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    function initThemeToggle(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const cur = document.documentElement.getAttribute('data-theme') || 'dark';
      el.checked = (cur === 'light');
      el.addEventListener('change', () => setTheme(el.checked ? 'light' : 'dark'));
    }

    // -------- Clock --------
    function updateClock() {
      const now = new Date();
      const y = now.getFullYear();
      const m = ('0' + (now.getMonth()+1)).slice(-2);
      const d = ('0' + now.getDate()).slice(-2);
      const hh = ('0' + now.getHours()).slice(-2);
      const mm = ('0' + now.getMinutes()).slice(-2);
      const ss = ('0' + now.getSeconds()).slice(-2);
      const el = document.getElementById('clock');
      if (el) el.textContent = y + '/' + m + '/' + d + ' ' + hh + ':' + mm + ':' + ss;
    }

    function createTooltipCard(type, index, texts) {
      const card = document.createElement('div');
      card.className = 'tooltip-card';
      card.dataset.type = type;
      card.dataset.index = index;

      const title = document.createElement('div');
      title.className = 'tooltip-title';
      title.textContent = (type === 'P' ? 'پورت ' : 'رله ') + index;

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'btn secondary add-btn';
      addBtn.textContent = '+';
      addBtn.onclick = function() {
        const inputs = card.querySelectorAll('textarea.tooltip-input');
        if (inputs.length >= 5) return;
        const ta = document.createElement('textarea');
        ta.className = 'tooltip-input';
        ta.rows = 1;
        ta.name = type + index + "_" + inputs.length;
        card.insertBefore(ta, addBtn);
      };

      card.appendChild(title);

      const count = Math.max(2, Math.min(5, (texts || []).length));
      for (let i = 0; i < count; i++) {
        const ta = document.createElement('textarea');
        ta.className = 'tooltip-input';
        ta.rows = 1;
        ta.name = type + index + "_" + i;
        ta.value = (texts && texts[i]) ? texts[i] : '';
        card.appendChild(ta);
      }

      card.appendChild(addBtn);
      return card;
    }

    function loadTooltips() {
      fetch('/api/tooltips', { cache: 'no-store' })
        .then(r => r.json())
        .then(data => {
          const pCont = document.getElementById('portsContainer');
          const rCont = document.getElementById('relaysContainer');
          pCont.innerHTML = '';
          rCont.innerHTML = '';

          const portMap = {};
          (data.ports || []).forEach(p => portMap[p.id] = p.texts || []);
          const relayMap = {};
          (data.relays || []).forEach(r => relayMap[r.id] = r.texts || []);

          for (let i = 1; i <= 24; i++) pCont.appendChild(createTooltipCard('P', i, portMap[i] || []));
          for (let i = 1; i <= 8; i++)  rCont.appendChild(createTooltipCard('R', i, relayMap[i] || []));
        })
        .catch(err => {
          console.log(err);
          document.getElementById('statusMsg').textContent = 'خطا در خواندن tooltipها';
        });
    }

    function saveAll() {
      const status = document.getElementById('statusMsg');
      status.textContent = 'در حال ذخیره...';

      const formData = new URLSearchParams();

      document.querySelectorAll('.tooltip-card').forEach(card => {
        const type = card.dataset.type;
        const index = card.dataset.index;
        const inputs = card.querySelectorAll('textarea.tooltip-input');
        inputs.forEach((ta, i) => {
          const key = type + index + "_" + i;
          formData.append(key, ta.value);
        });
      });

      fetch('/api/saveTooltips', { method: 'POST', body: formData, cache: 'no-store' })
      .then(r => r.text())
      .then(txt => {
        if (txt.startsWith('ERROR:')) status.textContent = 'خطا: ' + txt.substring(6);
        else status.textContent = 'ذخیره شد.';
      })
      .catch(err => {
        console.log(err);
        status.textContent = 'خطا در ذخیره.';
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      initThemeToggle('themeToggle');
      updateClock();
      setInterval(updateClock, 1000);
      loadTooltips();
    });
  </script>
</body>
</html>
