<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="utf-8">
  <title>تایمر رله‌ها</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body, input, button, select {
      font-family: Tahoma, sans-serif !important;
      font-size: 14px !important;
    }
  </style>
</head>
<body class="dash-body">
  <!-- Popup ساده -->
  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <div class="popup-title" id="popup-title"></div>
      <div class="popup-message" id="popup-message"></div>
      <button onclick="hidePopup()" class="btn primary small">باشه</button>
    </div>
  </div>

  <div class="dashboard-shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="app-logo">SW</div>
        <div class="app-name">تایمر</div>
      </div>

      <!-- ساعت + کلید مود (Dark/Light) -->
      <div class="topbar-right">
        <div id="clock" class="clock-text"></div>

        <div class="theme-switch">
          <span class="theme-label">    </span>
          <label class="switch" title="Dark/Light">
            <input id="themeToggle" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </header>

    <div class="layout">
      <nav class="side-menu">
        <a href="/dashboard" class="side-item">
          <span class="side-icon">📊</span>
          <span class="side-text">داشبورد</span>
        </a>
        <a href="/settings" class="side-item">
          <span class="side-icon">⚙️</span>
          <span class="side-text">تنظیمات</span>
        </a>
        <a href="/tooltip" class="side-item">
          <span class="side-icon">💬</span>
          <span class="side-text">راهنما (Tooltip)</span>
        </a>
        <a href="/log" class="side-item">
          <span class="side-icon">📜</span>
          <span class="side-text">لاگ</span>
        </a>
        <a href="/timer" class="side-item active">
          <span class="side-icon">⏱</span>
          <span class="side-text">تایمر</span>
        </a>
        <a href="/logout" class="side-item">
          <span class="side-icon">🚪</span>
          <span class="side-text">خروج</span>
        </a>
      </nav>

      <main class="dash-main">
        <section class="card glass light">
          <h3 class="card-title">تنظیم تایمر دو مرحله‌ای</h3>

          <form class="settings-form" id="form-timer" action="/api/setTimer" method="POST">
            <div class="form-row">
              <label>انتخاب خروجی:</label>
              <select name="target" id="targetSelect">
                <optgroup id="portsGroup" label="پورت‌ها"></optgroup>
                <optgroup id="relaysGroup" label="رله‌ها"></optgroup>
              </select>
            </div>

            <div class="form-row">
              <label>حالت فعلی → حالت اول:</label>
              <select name="first">
                <option value="on">روشن شود</option>
                <option value="off">خاموش شود</option>
              </select>
            </div>

            <div class="form-row">
              <label>مدت زمان بین دو حالت (ثانیه):</label>
              <input type="number" name="duration" min="1" value="60" required>
            </div>

            <div class="form-row">
              <label>حالت دوم بعد از مدت زمان:</label>
              <select name="second">
                <option value="off">خاموش شود</option>
                <option value="on">روشن شود</option>
              </select>
            </div>

            <button type="submit" class="btn primary small">ثبت تایمر</button>
          </form>

          <p class="settings-text" style="margin-top:8px;">
            مثال: اگر «پورت ۱، ابتدا روشن، بعد از ۶۰ ثانیه خاموش» را انتخاب کنید، پورت ۱ فوراً روشن و بعد از ۶۰ ثانیه به‌طور خودکار خاموش می‌شود.
          </p>
        </section>
      </main>
    </div>
  </div>

  <script>
    // -------- Theme (Dark/Light) --------
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const theme = saved || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    function initThemeToggle(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const cur = document.documentElement.getAttribute('data-theme') || 'dark';
      el.checked = (cur === 'light');
      el.addEventListener('change', () => setTheme(el.checked ? 'light' : 'dark'));
    }

    // -------- Clock --------
    function updateClock() {
      const now = new Date();
      const y = now.getFullYear();
      const m = ('0' + (now.getMonth() + 1)).slice(-2);
      const d = ('0' + now.getDate()).slice(-2);
      const hh = ('0' + now.getHours()).slice(-2);
      const mm = ('0' + now.getMinutes()).slice(-2);
      const ss = ('0' + now.getSeconds()).slice(-2);
      const el = document.getElementById('clock');
      if (el) el.textContent = y + '/' + m + '/' + d + ' ' + hh + ':' + mm + ':' + ss;
    }

    // -------- Popup --------
    function showPopup(title, msg) {
      document.getElementById('popup-title').textContent = title || '';
      document.getElementById('popup-message').textContent = msg || '';
      document.getElementById('popup').classList.remove('hidden');
    }
    function hidePopup() {
      document.getElementById('popup').classList.add('hidden');
    }

    // -------- Target Select Fill (P1..P24, R1..R8) --------
    function fillTargetSelect() {
      const portGroup  = document.getElementById('portsGroup');
      const relayGroup = document.getElementById('relaysGroup');
      if (!portGroup || !relayGroup) return;

      portGroup.innerHTML = '';
      relayGroup.innerHTML = '';

      for (let i = 1; i <= 24; i++) {
        const opt = document.createElement('option');
        opt.value = 'P' + i;
        opt.textContent = 'پورت ' + i;
        portGroup.appendChild(opt);
      }
      for (let i = 1; i <= 8; i++) {
        const opt = document.createElement('option');
        opt.value = 'R' + i;
        opt.textContent = 'رله ' + i;
        relayGroup.appendChild(opt);
      }
    }

    // -------- Submit Timer --------
    document.getElementById('form-timer').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = new URLSearchParams(new FormData(this));
      fetch(this.action, {
        method: this.method || 'POST',
        body: data,
        cache: 'no-store'
      })
      .then(r => r.text())
      .then(txt => {
        if (txt.startsWith('ERROR:')) {
          showPopup('خطا', txt.substring(6));
        } else {
          showPopup('تایمر', txt || 'تایمر تنظیم شد.');
        }
      })
      .catch(err => {
        console.log(err);
        showPopup('خطا', 'عدم دسترسی یا خطا در سرور');
      });
    });

    document.addEventListener('DOMContentLoaded', function() {
      initThemeToggle('themeToggle');
      updateClock();
      setInterval(updateClock, 1000);
      fillTargetSelect();
    });
  </script>
</body>
</html>
