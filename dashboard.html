<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="utf-8">
  <title>داشبورد</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body, input, button {
      font-family: Tahoma, sans-serif !important;
    }

    /* پورت‌ها (دسکتاپ) */
    .ports-row {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      direction: ltr;
    }

    .port-icon-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 4px 4px;
      cursor: pointer;
    }

    .port-icon-wrap img {
      display: block;
      width: 32px;
      height: 32px;
    }

    .port-label {
      margin-top: 2px;
      font-size: 11px;
    }

    /* رله‌ها */
    .power-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 12px;
    }

    .power-icon-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 8px 12px;
      width: 60px;
      cursor: pointer;
    }

    .power-icon-wrap img {
      display: block;
      width: 40px;
      height: 40px;
    }

    .power-label {
      margin-top: 4px;
      font-size: 12px;
    }

    /* Tooltip با چند خط متن */
    .tooltip {
      position: fixed;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
      max-width: 260px;
      z-index: 9999;
      white-space: pre-line;
      pointer-events: none;
    }

    /* حالت موبایل: پورت‌ها در ۳ ردیف ۸تایی با فاصلهٔ عمودی مناسب */
    @media (max-width: 600px) {
      .ports-row {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-auto-rows: auto;
        row-gap: 18px;
        column-gap: 4px;
        justify-items: center;
        direction: ltr;
      }
      .port-icon-wrap { margin: 0; }
    }
  </style>
</head>
<body class="dash-body">
  <!-- Popup -->
  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <div class="popup-title" id="popup-title"></div>
      <div class="popup-message" id="popup-message"></div>
      <div class="popup-buttons" id="popup-buttons">
        <button onclick="hidePopup()" class="btn primary small">باشه</button>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="tooltip hidden"></div>

  <div class="dashboard-shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="app-logo">SW</div>
        <div class="app-name">داشبورد (وضعیت پورت ها)</div>
      </div>

      <div class="topbar-right">
        <div id="clock" class="clock-text"></div>
        <div class="theme-switch" title="Dark/Light">
          <label class="switch">
            <input id="themeToggle" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </header>

    <div class="layout">
      <nav class="side-menu">
        <a href="/dashboard" class="side-item active">
          <span class="side-icon">📊</span>
          <span class="side-text">داشبورد</span>
        </a>
        <a href="/settings" class="side-item">
          <span class="side-icon">⚙️</span>
          <span class="side-text">تنظیمات</span>
        </a>
        <a href="/tooltip" class="side-item">
          <span class="side-icon">💬</span>
          <span class="side-text">راهنما (Tooltip)</span>
        </a>
        <a href="/log" class="side-item">
          <span class="side-icon">📜</span>
          <span class="side-text">لاگ</span>
        </a>
        <a href="/timer" class="side-item">
          <span class="side-icon">⏱</span>
          <span class="side-text">تایمر</span>
        </a>
        <a href="/logout" class="side-item">
          <span class="side-icon">🚪</span>
          <span class="side-text">خروج</span>
        </a>
      </nav>

      <main class="dash-main">
        <!-- پورت‌های شبکه -->
        <section class="card glass neon">
          <h3 class="card-title">پورت‌های شبکه</h3>
          <div class="ports-row" id="portsRow"></div>
          <div style="text-align:center;margin-top:8px;">
            <button class="btn secondary small" onclick="confirmToggleAllPorts(true)">روشن کردن همه‌ی پورت‌ها</button>
            <button class="btn secondary small" onclick="confirmToggleAllPorts(false)">خاموش کردن همه‌ی پورت‌ها</button>
          </div>
        </section>

        <!-- رله‌ها -->
        <section class="card glass light">
          <h3 class="card-title">رله‌ها</h3>
          <div class="power-row" id="relaysRow"></div>
          <div style="text-align:center;margin-top:8px;">
            <button class="btn secondary small" onclick="confirmToggleAllRelays(true)">روشن کردن همه‌ی رله‌ها</button>
            <button class="btn secondary small" onclick="confirmToggleAllRelays(false)">خاموش کردن همه‌ی رله‌ها</button>
          </div>
        </section>

        <!-- وضعیت -->
        <section class="card glass status-card">
          <div class="status-label">وضعیت کل خروجی‌ها:</div>
          <div class="status-text" id="statusText">در حال به‌روزرسانی...</div>
        </section>

        <!-- ولتاژ و جریان (کنار هم) -->
        <div class="gauge-row-pair">
          <section class="card glass light">
            <h3 class="card-title">ولتاژها</h3>
            <div class="gauge-pair-grid" id="voltGrid"></div>
          </section>
          <section class="card glass light">
            <h3 class="card-title">جریان‌ها</h3>
            <div class="gauge-pair-grid" id="ampGrid"></div>
          </section>
        </div>

        <!-- دما و رطوبت (وسط) -->
        <section class="card glass light gauge-env-card">
          <h3 class="card-title">دما و رطوبت</h3>
          <div class="gauge-pair-grid" id="envGrid"></div>
        </section>
      </main>
    </div>
  </div>

  <script>
    // -------- Theme (Dark/Light) --------
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const theme = saved || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    function initThemeToggle(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const cur = document.documentElement.getAttribute('data-theme') || 'dark';
      el.checked = (cur === 'light');
      el.addEventListener('change', () => setTheme(el.checked ? 'light' : 'dark'));
    }

    // -------- Clock --------
    function updateClock() {
      const now = new Date();
      const y = now.getFullYear();
      const m = ('0' + (now.getMonth()+1)).slice(-2);
      const d = ('0' + now.getDate()).slice(-2);
      const hh = ('0' + now.getHours()).slice(-2);
      const mm = ('0' + now.getMinutes()).slice(-2);
      const ss = ('0' + now.getSeconds()).slice(-2);
      const el = document.getElementById('clock');
      if (el) el.textContent = y + '/' + m + '/' + d + ' ' + hh + ':' + mm + ':' + ss;
    }

    // -------- Popup --------
    function showPopup(title, msg) {
      document.getElementById('popup-title').textContent = title || '';
      document.getElementById('popup-message').textContent = msg || '';
      const btns = document.getElementById('popup-buttons');
      btns.innerHTML = '<button onclick="hidePopup()" class="btn primary small">باشه</button>';
      document.getElementById('popup').classList.remove('hidden');
    }
    function hidePopup() {
      document.getElementById('popup').classList.add('hidden');
    }

    // -------- Tooltip --------
    const tooltip = document.getElementById('tooltip');

    function onIconHover(ev) {
      const wrap = ev.currentTarget;
      const label = wrap.dataset.tooltip || wrap.dataset.label || '';
      if (!label.trim()) return;

      tooltip.textContent = label;
      tooltip.classList.remove('hidden');

      const rect = wrap.getBoundingClientRect();
      const ttRect = tooltip.getBoundingClientRect();
      const top = rect.top - ttRect.height - 6;
      const left = rect.left + rect.width / 2 - ttRect.width / 2;

      tooltip.style.top = top + 'px';
      tooltip.style.left = left + 'px';
    }
    function hideTooltip() {
      tooltip.classList.add('hidden');
    }

    // -------- Toggle outputs --------
    function onIconClick(ev) {
      ev.preventDefault();
      const wrap = ev.currentTarget;
      const ch = parseInt(wrap.dataset.ch, 10);
      if (isNaN(ch)) return;

      fetch('/toggle?ch=' + ch, { cache: 'no-store' })
        .then(resp => resp.text())
        .then(txt => {
          if (txt.startsWith('ERROR:')) showPopup('خطا', txt.substring(6));
          else setTimeout(updateRelaysStatus, 200);
        })
        .catch(err => {
          console.log(err);
          showPopup('خطا', 'عدم دسترسی یا خطا در ارتباط با سرور');
        });
    }

    function addPortIcon(portsRow, portNum) {
      const ch = portNum - 1;

      const wrap = document.createElement('div');
      wrap.className = 'port-icon-wrap';
      wrap.dataset.ch = ch;
      wrap.dataset.label = 'پورت ' + portNum;

      const img = document.createElement('img');
      img.src = '/img/ethernet_red.png';
      img.alt = 'Port ' + portNum;

      const lbl = document.createElement('div');
      lbl.className = 'port-label';
      lbl.textContent = portNum.toString();

      wrap.appendChild(img);
      wrap.appendChild(lbl);
      wrap.addEventListener('click', onIconClick);
      wrap.addEventListener('mouseenter', onIconHover);
      wrap.addEventListener('mouseleave', hideTooltip);

      portsRow.appendChild(wrap);
    }

    function createIcons() {
      const portsRow = document.getElementById('portsRow');
      const relaysRow = document.getElementById('relaysRow');

      for (let portNum = 1; portNum <= 24; portNum++) addPortIcon(portsRow, portNum);

      for (let relNum = 1; relNum <= 8; relNum++) {
        const ch = 24 + (relNum - 1);

        const wrap = document.createElement('div');
        wrap.className = 'power-icon-wrap';
        wrap.dataset.ch = ch;
        wrap.dataset.label = 'رله ' + relNum;

        const img = document.createElement('img');
        img.src = '/img/power-red.png';
        img.alt = 'Relay ' + relNum;

        const lbl = document.createElement('div');
        lbl.className = 'power-label';
        lbl.textContent = relNum.toString();

        wrap.appendChild(img);
        wrap.appendChild(lbl);
        wrap.addEventListener('click', onIconClick);
        wrap.addEventListener('mouseenter', onIconHover);
        wrap.addEventListener('mouseleave', hideTooltip);

        relaysRow.appendChild(wrap);
      }
    }

    function applyTooltips(json) {
      const portMap = {};
      (json.ports || []).forEach(p => {
        const lines = (p.texts || []).filter(t => t && t.trim().length > 0);
        portMap[p.id] = lines.join('\n');
      });
      const relayMap = {};
      (json.relays || []).forEach(r => {
        const lines = (r.texts || []).filter(t => t && t.trim().length > 0);
        relayMap[r.id] = lines.join('\n');
      });

      document.querySelectorAll('.port-icon-wrap').forEach(wrap => {
        const portNo = parseInt(wrap.dataset.ch, 10) + 1;
        wrap.dataset.tooltip = portMap[portNo] || '';
      });
      document.querySelectorAll('.power-icon-wrap').forEach(wrap => {
        const relNo = parseInt(wrap.dataset.ch, 10) - 24 + 1;
        wrap.dataset.tooltip = relayMap[relNo] || '';
      });
    }

    function loadTooltips() {
      fetch('/api/tooltips', { cache: 'no-store' })
        .then(r => r.json())
        .then(applyTooltips)
        .catch(err => console.log(err));
    }

    function updateRelaysStatus() {
      fetch('/relays.txt', { cache: 'no-store' })
        .then(resp => resp.text())
        .then(txt => {
          const stEl = document.getElementById('statusText');
          stEl.textContent = txt;

          document.querySelectorAll('.port-icon-wrap').forEach(wrap => {
            const ch = parseInt(wrap.dataset.ch, 10);
            const img = wrap.querySelector('img');
            const bit = (ch < txt.length) ? txt.charAt(ch) : '0';
            img.src = (bit === '1') ? '/img/ethernet_green.png' : '/img/ethernet_red.png';
          });

          document.querySelectorAll('.power-icon-wrap').forEach(wrap => {
            const ch = parseInt(wrap.dataset.ch, 10);
            const img = wrap.querySelector('img');
            const bit = (ch < txt.length) ? txt.charAt(ch) : '0';
            img.src = (bit === '1') ? '/img/power-green.png' : '/img/power-red.png';
          });
        })
        .catch(err => {
          console.log(err);
          document.getElementById('statusText').textContent = 'خطا در خواندن وضعیت';
        });
    }

    function confirmToggleAllPorts(on) {
      const msg = on
        ? 'آیا مطمئن هستید می‌خواهید همه پورت‌ها را روشن کنید؟'
        : 'آیا مطمئن هستید می‌خواهید همه پورت‌ها را خاموش کنید؟';
      document.getElementById('popup-title').textContent = 'تأیید';
      document.getElementById('popup-message').textContent = msg;
      const btns = document.getElementById('popup-buttons');
      btns.innerHTML =
        '<button class="btn danger small" onclick="doToggleAllPorts(' + (on ? 'true' : 'false') + ')">بله</button>' +
        '<button class="btn secondary small" onclick="hidePopup()">خیر</button>';
      document.getElementById('popup').classList.remove('hidden');
    }

    function doToggleAllPorts(on) {
      fetch('/api/toggleAllPorts', {
        method: 'POST',
        body: new URLSearchParams({ mode: on ? 'on' : 'off' }),
        cache: 'no-store'
      })
      .then(r => r.text())
      .then(txt => {
        hidePopup();
        if (txt.startsWith('ERROR:')) showPopup('خطا', txt.substring(6));
        else setTimeout(updateRelaysStatus, 200);
      })
      .catch(err => {
        console.log(err);
        showPopup('خطا', 'عدم دسترسی یا خطا در ارتباط با سرور');
      });
    }

    function confirmToggleAllRelays(on) {
      const msg = on
        ? 'آیا مطمئن هستید می‌خواهید همه رله‌ها را روشن کنید؟'
        : 'آیا مطمئن هستید می‌خواهید همه رله‌ها را خاموش کنید؟';
      document.getElementById('popup-title').textContent = 'تأیید';
      document.getElementById('popup-message').textContent = msg;
      const btns = document.getElementById('popup-buttons');
      btns.innerHTML =
        '<button class="btn danger small" onclick="doToggleAllRelays(' + (on ? 'true' : 'false') + ')">بله</button>' +
        '<button class="btn secondary small" onclick="hidePopup()">خیر</button>';
      document.getElementById('popup').classList.remove('hidden');
    }

    function doToggleAllRelays(on) {
      fetch('/api/toggleAllRelays', {
        method: 'POST',
        body: new URLSearchParams({ mode: on ? 'on' : 'off' }),
        cache: 'no-store'
      })
      .then(r => r.text())
      .then(txt => {
        hidePopup();
        if (txt.startsWith('ERROR:')) showPopup('خطا', txt.substring(6));
        else setTimeout(updateRelaysStatus, 200);
      })
      .catch(err => {
        console.log(err);
        showPopup('خطا', 'عدم دسترسی یا خطا در ارتباط با سرور');
      });
    }

    // ---------------- Gauges (SVG – redesigned) ----------------
    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

    function valueToAngle(value, min, max) {
      const t = clamp((value - min) / (max - min), 0, 1);
      return -120 + t * 240;
    }

    function polarToXY(cx, cy, r, angDeg) {
      const a = (angDeg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    }

    function arcPath(cx, cy, r, a0, a1) {
      const p0 = polarToXY(cx, cy, r, a0);
      const p1 = polarToXY(cx, cy, r, a1);
      const large = (Math.abs(a1 - a0) > 180) ? 1 : 0;
      const sweep = (a1 > a0) ? 1 : 0;
      return 'M ' + p0.x.toFixed(2) + ' ' + p0.y.toFixed(2) +
             ' A ' + r + ' ' + r + ' 0 ' + large + ' ' + sweep +
             ' ' + p1.x.toFixed(2) + ' ' + p1.y.toFixed(2);
    }

    /**
     * gaugeTile – SVG gauge with multi-zone coloring and graduated ticks
     * cfg: {
     *   min, max,
     *   zones: [{from, to, color}],
     *   labelStep: interval for labeled ticks (e.g. 50),
     *   minorStep: interval for short unlabeled ticks (e.g. 10),
     *   dp: decimal places
     * }
     */
    function gaugeTile(title, unit, cfg) {
      // SVG geometry constants
      const VW = 200, VH = 158;
      const cx = 100, cy = 100, r = 78;
      const trackW = 12;
      const minorTickInner = r + 6,  minorTickOuter = r + 10;
      const majorTickInner = r + 4,  majorTickOuter = r + 13;
      const labelR = r + 20;

      const tile = document.createElement('div');
      tile.className = 'gauge-tile';

      const titleEl = document.createElement('div');
      titleEl.className = 'gauge-title';
      titleEl.textContent = title;
      tile.appendChild(titleEl);

      const wrap = document.createElement('div');
      wrap.className = 'gauge-wrap';
      tile.appendChild(wrap);

      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 ' + VW + ' ' + VH);
      svg.classList.add('gauge-svg');
      wrap.appendChild(svg);

      function mkEl(tag, attrs) {
        const el = document.createElementNS(svgNS, tag);
        for (const k in attrs) el.setAttribute(k, attrs[k]);
        return el;
      }

      // Track (grey background arc)
      svg.appendChild(mkEl('path', {
        d: arcPath(cx, cy, r, -120, 120),
        fill: 'none', 'stroke-width': trackW, class: 'gauge-track'
      }));

      // Color zones
      (cfg.zones || []).forEach(function(z) {
        var a0 = valueToAngle(z.from, cfg.min, cfg.max);
        var a1 = valueToAngle(z.to,   cfg.min, cfg.max);
        svg.appendChild(mkEl('path', {
          d: arcPath(cx, cy, r, a0, a1),
          fill: 'none', 'stroke-width': trackW,
          'stroke-linecap': 'butt', stroke: z.color
        }));
      });

      // Minor ticks (no label)
      if (cfg.minorStep) {
        for (var v = cfg.min; v <= cfg.max; v += cfg.minorStep) {
          // skip if also a major tick (will be drawn separately)
          if (cfg.labelStep && (Math.round(v - cfg.min) % Math.round(cfg.labelStep) === 0)) continue;
          var ang = valueToAngle(v, cfg.min, cfg.max);
          var p0  = polarToXY(cx, cy, minorTickInner, ang);
          var p1  = polarToXY(cx, cy, minorTickOuter, ang);
          svg.appendChild(mkEl('line', {
            x1: p0.x.toFixed(2), y1: p0.y.toFixed(2),
            x2: p1.x.toFixed(2), y2: p1.y.toFixed(2),
            class: 'gauge-tick', 'stroke-width': '1.5'
          }));
        }
      }

      // Major ticks + labels
      if (cfg.labelStep) {
        for (var v = cfg.min; v <= cfg.max + 0.001; v += cfg.labelStep) {
          var vr = Math.round(v * 100) / 100; // avoid float drift
          var ang = valueToAngle(vr, cfg.min, cfg.max);
          var p0  = polarToXY(cx, cy, majorTickInner, ang);
          var p1  = polarToXY(cx, cy, majorTickOuter, ang);
          svg.appendChild(mkEl('line', {
            x1: p0.x.toFixed(2), y1: p0.y.toFixed(2),
            x2: p1.x.toFixed(2), y2: p1.y.toFixed(2),
            class: 'gauge-tick-major', 'stroke-width': '2'
          }));
          var lp = polarToXY(cx, cy, labelR, ang);
          var lbl = document.createElementNS(svgNS, 'text');
          lbl.setAttribute('x', lp.x.toFixed(2));
          lbl.setAttribute('y', lp.y.toFixed(2));
          lbl.setAttribute('text-anchor', 'middle');
          lbl.setAttribute('dominant-baseline', 'central');
          lbl.setAttribute('class', 'gauge-tick-label');
          lbl.textContent = vr % 1 === 0 ? Math.round(vr) : vr;
          svg.appendChild(lbl);
        }
      }

      // Needle
      const needle = mkEl('line', {
        x1: cx, y1: cy, x2: cx, y2: cy - 60,
        'stroke-width': '3', 'stroke-linecap': 'round', class: 'gauge-needle'
      });
      svg.appendChild(needle);

      // Hub
      svg.appendChild(mkEl('circle', {
        cx: cx, cy: cy, r: '6', fill: 'rgba(0,0,0,0.40)'
      }));

      // Numeric value box below SVG
      const numBox = document.createElement('div');
      numBox.className = 'gauge-numbox';
      numBox.textContent = '-- ' + unit;
      tile.appendChild(numBox);

      // Value updater
      tile._setValue = function(v) {
        const ang = valueToAngle(v, cfg.min, cfg.max);
        needle.setAttribute('transform', 'rotate(' + ang + ' ' + cx + ' ' + cy + ')');
        numBox.textContent = v.toFixed(cfg.dp !== undefined ? cfg.dp : 1) + ' ' + unit;
      };

      return tile;
    }

    // Zone definitions
    var AC_VOLT_ZONES = [
      { from: 0,   to: 190, color: '#f59e0b' },  // نارنجی
      { from: 190, to: 230, color: '#22c55e' },  // سبز
      { from: 230, to: 260, color: '#ef4444' }   // قرمز
    ];
    var DC_VOLT_ZONES = [
      { from: 0,  to: 20, color: '#f59e0b' },    // نارنجی
      { from: 20, to: 28, color: '#22c55e' },    // سبز
      { from: 28, to: 60, color: '#ef4444' }     // قرمز
    ];
    var CURRENT_ZONES = [
      { from: 0,  to: 10, color: '#22c55e' },    // سبز
      { from: 10, to: 20, color: '#eab308' },    // زرد
      { from: 20, to: 30, color: '#f59e0b' },    // نارنجی
      { from: 30, to: 40, color: '#f87171' },    // قرمز روشن
      { from: 40, to: 50, color: '#ef4444' }     // قرمز تیره
    ];
    var TEMP_ZONES = [
      { from: -20, to: 0,  color: '#93c5fd' },   // آبی روشن
      { from: 0,   to: 10, color: '#3b82f6' },   // آبی
      { from: 10,  to: 20, color: '#22c55e' },   // سبز
      { from: 20,  to: 30, color: '#eab308' },   // زرد
      { from: 30,  to: 40, color: '#f59e0b' },   // نارنجی
      { from: 40,  to: 60, color: '#ef4444' }    // قرمز
    ];
    var HUM_ZONES = [
      { from: 0,  to: 20,  color: '#22c55e' },   // سبز
      { from: 20, to: 40,  color: '#f59e0b' },   // نارنجی
      { from: 40, to: 60,  color: '#ef4444' },   // قرمز
      { from: 60, to: 100, color: '#92400e' }    // قهوه‌ای
    ];

    function buildGauges() {
      const voltGrid = document.getElementById('voltGrid');
      const ampGrid  = document.getElementById('ampGrid');
      const envGrid  = document.getElementById('envGrid');

      // ولتاژ برق شهری (AC mains): 0..260V
      const vMains = gaugeTile('ولتاژ برق شهری', 'V', {
        min: 0, max: 260, zones: AC_VOLT_ZONES,
        labelStep: 50, minorStep: 10, dp: 0
      });
      // ولتاژ DC: 0..60V
      const vDC = gaugeTile('ولتاژ DC', 'V', {
        min: 0, max: 60, zones: DC_VOLT_ZONES,
        labelStep: 10, minorStep: 5, dp: 1
      });
      voltGrid.appendChild(vMains);
      voltGrid.appendChild(vDC);

      // جریان برق شهری (AC mains): 0..50A
      const aMains = gaugeTile('جریان برق شهری', 'A', {
        min: 0, max: 50, zones: CURRENT_ZONES,
        labelStep: 10, minorStep: 5, dp: 1
      });
      // جریان DC: 0..50A
      const aDC = gaugeTile('جریان DC', 'A', {
        min: 0, max: 50, zones: CURRENT_ZONES,
        labelStep: 10, minorStep: 5, dp: 1
      });
      ampGrid.appendChild(aMains);
      ampGrid.appendChild(aDC);

      // دما: -20..60°C
      const temp = gaugeTile('دما', '°C', {
        min: -20, max: 60, zones: TEMP_ZONES,
        labelStep: 20, minorStep: 10, dp: 0
      });
      // رطوبت: 0..100%
      const hum = gaugeTile('رطوبت', '%', {
        min: 0, max: 100, zones: HUM_ZONES,
        labelStep: 20, minorStep: 10, dp: 0
      });
      envGrid.appendChild(temp);
      envGrid.appendChild(hum);

      window.__gauges = { vMains, vDC, aMains, aDC, temp, hum };
    }

    // برای مرحله اول: مقادیر نمونه (بعداً با fetch('/api/power') جایگزین می‌شود)
    function updateGaugeDemo() {
      const g = window.__gauges;
      if (!g) return;
      g.vMains._setValue(218);
      g.vDC._setValue(24.2);
      g.aMains._setValue(1.8);
      g.aDC._setValue(4.2);
      g.temp._setValue(28);
      g.hum._setValue(41);
    }

    document.addEventListener('DOMContentLoaded', function() {
      initThemeToggle('themeToggle');
      updateClock();
      setInterval(updateClock, 1000);

      createIcons();
      loadTooltips();
      updateRelaysStatus();
      setInterval(updateRelaysStatus, 5000);

      buildGauges();
      updateGaugeDemo();
      setInterval(updateGaugeDemo, 3000);
    });
  </script>
</body>
</html>
